
<style>
*{box-sizing:border-box;margin:0;padding:0}
#app{font-family:var(--font-sans);color:var(--color-text-primary);max-width:680px}
.header{padding:20px 0 16px;border-bottom:0.5px solid var(--color-border-tertiary)}
.header-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px}
.brand{font-size:20px;font-weight:500}
.subtitle{font-size:13px;color:var(--color-text-secondary)}
.badge-posted{background:var(--color-background-success);color:var(--color-text-success);font-size:12px;padding:4px 12px;border-radius:20px;font-weight:500}
.tabs{display:flex;gap:4px;margin:16px 0 0}
.tab{padding:8px 16px;font-size:13px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-tertiary);background:transparent;color:var(--color-text-secondary);cursor:pointer;display:flex;align-items:center;gap:6px;transition:all 0.15s}
.tab:hover{background:var(--color-background-secondary)}
.tab.active{background:var(--color-background-primary);color:var(--color-text-primary);border-color:var(--color-border-primary);font-weight:500}
.tab i{font-size:15px}
.section{display:none;padding:20px 0}
.section.active{display:block}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:24px}
.stat{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:14px 16px;text-align:center}
.stat-num{font-size:26px;font-weight:500;line-height:1}
.stat-label{font-size:12px;color:var(--color-text-secondary);margin-top:4px}
.section-label{font-size:11px;font-weight:500;color:var(--color-text-tertiary);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:12px}
.grid30{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin-bottom:24px}
.day-cell{aspect-ratio:1;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-tertiary);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;font-size:13px;color:var(--color-text-secondary);transition:all 0.15s;position:relative;background:var(--color-background-secondary)}
.day-cell:hover{border-color:var(--color-border-primary);color:var(--color-text-primary)}
.day-cell.today{border-color:var(--color-border-info);color:var(--color-text-info);background:var(--color-background-info);font-weight:500}
.day-cell.posted{background:var(--color-background-success);border-color:var(--color-border-success);color:var(--color-text-success)}
.day-cell.posted::after{content:'';width:5px;height:5px;border-radius:50%;background:var(--color-text-success);position:absolute;bottom:5px}
.day-cell.current-only{border-color:var(--color-border-primary)}
.checklist{display:flex;flex-direction:column;gap:6px;margin-bottom:20px}
.check-item{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-tertiary);background:var(--color-background-primary);cursor:pointer;transition:all 0.15s}
.check-item:hover{border-color:var(--color-border-secondary)}
.check-item.done{opacity:0.5}
.check-item.done .check-text{text-decoration:line-through}
.check-box{width:18px;height:18px;border-radius:4px;border:1.5px solid var(--color-border-secondary);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.15s}
.check-item.done .check-box{background:var(--color-background-success);border-color:var(--color-border-success)}
.check-text{font-size:14px;flex:1}
.tag{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:500}
.tag-plan{background:var(--color-background-warning);color:var(--color-text-warning)}
.tag-record{background:var(--color-background-info);color:var(--color-text-info)}
.tag-edit{background:var(--color-background-danger);color:var(--color-text-danger)}
.tag-post{background:var(--color-background-success);color:var(--color-text-success)}
.reset-btn{width:100%;padding:12px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:transparent;color:var(--color-text-secondary);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
.reset-btn:hover{background:var(--color-background-secondary)}
.script-list{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.script-card{border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-tertiary);background:var(--color-background-primary);overflow:hidden}
.script-header{padding:12px 14px;display:flex;align-items:center;gap:10px;cursor:pointer}
.script-header:hover{background:var(--color-background-secondary)}
.script-day-badge{font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px;background:var(--color-background-info);color:var(--color-text-info);flex-shrink:0}
.script-title{font-size:14px;flex:1;font-weight:500}
.script-status{font-size:11px;padding:3px 10px;border-radius:20px}
.script-status.ready{background:var(--color-background-success);color:var(--color-text-success)}
.script-status.draft{background:var(--color-background-warning);color:var(--color-text-warning)}
.script-body{display:none;padding:0 14px 14px;border-top:0.5px solid var(--color-border-tertiary)}
.script-body.open{display:block}
.script-field{margin-top:12px}
.script-field label{font-size:11px;font-weight:500;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:0.06em;display:block;margin-bottom:6px}
.script-field textarea{width:100%;padding:10px 12px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-tertiary);background:var(--color-background-secondary);color:var(--color-text-primary);font-size:13px;font-family:var(--font-sans);resize:vertical;min-height:60px;line-height:1.5}
.script-field textarea:focus{outline:none;border-color:var(--color-border-primary)}
.add-btn{width:100%;padding:11px;border-radius:var(--border-radius-md);border:0.5px dashed var(--color-border-secondary);background:transparent;color:var(--color-text-secondary);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
.add-btn:hover{background:var(--color-background-secondary);color:var(--color-text-primary)}
.idea-list{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
.idea-item{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-tertiary);background:var(--color-background-primary)}
.idea-text{font-size:14px;flex:1}
.idea-cat{font-size:11px;padding:3px 10px;border-radius:20px;flex-shrink:0}
.idea-cat.value{background:var(--color-background-info);color:var(--color-text-info)}
.idea-cat.viral{background:var(--color-background-danger);color:var(--color-text-danger)}
.idea-cat.series{background:var(--color-background-warning);color:var(--color-text-warning)}
.idea-cat.auth{background:var(--color-background-success);color:var(--color-text-success)}
.idea-del{background:none;border:none;color:var(--color-text-tertiary);cursor:pointer;padding:2px;font-size:16px;line-height:1;display:flex}
.idea-del:hover{color:var(--color-text-danger)}
.idea-input-row{display:flex;gap:8px}
.idea-input-row input{flex:1;padding:10px 12px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-tertiary);background:var(--color-background-secondary);color:var(--color-text-primary);font-size:13px}
.idea-input-row input:focus{outline:none;border-color:var(--color-border-primary)}
.idea-input-row select{padding:10px 12px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-tertiary);background:var(--color-background-secondary);color:var(--color-text-primary);font-size:13px;cursor:pointer}
.idea-input-row select:focus{outline:none}
.idea-add-btn{padding:10px 14px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:transparent;color:var(--color-text-primary);font-size:13px;cursor:pointer;display:flex;align-items:center;gap:6px;white-space:nowrap}
.idea-add-btn:hover{background:var(--color-background-secondary)}
.sb-list{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.sb-card{border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-tertiary);background:var(--color-background-primary);overflow:hidden}
.sb-header{padding:12px 14px;display:flex;align-items:center;gap:10px;cursor:pointer}
.sb-header:hover{background:var(--color-background-secondary)}
.sb-title{font-size:14px;flex:1;font-weight:500}
.sb-body{display:none;padding:0 14px 14px}
.sb-body.open{display:block}
.sb-row{display:grid;grid-template-columns:80px 1fr 1fr;gap:8px;margin-top:10px}
.sb-row:first-child{border-bottom:0.5px solid var(--color-border-tertiary);padding-bottom:8px;margin-bottom:2px}
.sb-row span{font-size:11px;font-weight:500;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:0.06em}
.sb-row input{padding:8px 10px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-tertiary);background:var(--color-background-secondary);color:var(--color-text-primary);font-size:13px;width:100%}
.sb-row input:focus{outline:none;border-color:var(--color-border-primary)}
.sb-add-row{margin-top:8px}
.sb-add-row button{padding:7px 12px;border-radius:var(--border-radius-md);border:0.5px dashed var(--color-border-secondary);background:transparent;color:var(--color-text-secondary);font-size:12px;cursor:pointer;display:flex;align-items:center;gap:6px}
.sb-add-row button:hover{background:var(--color-background-secondary)}
.progress-bar{height:3px;background:var(--color-background-secondary);border-radius:2px;margin:8px 0 0;overflow:hidden}
.progress-fill{height:100%;background:var(--color-text-success);border-radius:2px;transition:width 0.3s}
</style>

<h2 class="sr-only">TypoBibek 30-day content tracker with daily checklist, scripts, ideas, and storyboard</h2>

<div id="app">
  <div class="header">
    <div class="header-top">
      <div>
        <div class="brand">TypoBibek</div>
        <div class="subtitle" id="day-subtitle">Day 1 of 30</div>
        <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:3%"></div></div>
      </div>
      <div class="badge-posted" id="posted-badge">0 posted</div>
    </div>
    <div class="tabs">
      <button class="tab active" onclick="switchTab('today')"><i class="ti ti-home" aria-hidden="true"></i>Today</button>
      <button class="tab" onclick="switchTab('scripts')"><i class="ti ti-file" aria-hidden="true"></i>Scripts</button>
      <button class="tab" onclick="switchTab('ideas')"><i class="ti ti-bulb" aria-hidden="true"></i>Ideas</button>
      <button class="tab" onclick="switchTab('board')"><i class="ti ti-layout-board" aria-hidden="true"></i>Board</button>
    </div>
  </div>

  <div id="tab-today" class="section active">
    <div class="stats">
      <div class="stat"><div class="stat-num" id="stat-posted">0</div><div class="stat-label">posted</div></div>
      <div class="stat"><div class="stat-num" id="stat-day">1</div><div class="stat-label">day</div></div>
      <div class="stat"><div class="stat-num" id="stat-left">30</div><div class="stat-label">days left</div></div>
    </div>

    <div class="section-label">30 day map</div>
    <div class="grid30" id="grid30"></div>

    <div class="section-label">today's checklist</div>
    <div class="checklist" id="checklist"></div>
    <button class="reset-btn" onclick="resetToday()"><i class="ti ti-refresh" aria-hidden="true"></i>Reset today</button>
  </div>

  <div id="tab-scripts" class="section">
    <div class="section-label">your scripts</div>
    <div class="script-list" id="script-list"></div>
    <button class="add-btn" onclick="addScript()"><i class="ti ti-plus" aria-hidden="true"></i>New script</button>
  </div>

  <div id="tab-ideas" class="section">
    <div class="section-label">idea vault</div>
    <div class="idea-list" id="idea-list"></div>
    <div class="idea-input-row">
      <input type="text" id="idea-input" placeholder="Drop an idea..." onkeydown="if(event.key==='Enter')addIdea()">
      <select id="idea-cat">
        <option value="value">Value</option>
        <option value="viral">Viral</option>
        <option value="series">Series</option>
        <option value="auth">Authentic</option>
      </select>
      <button class="idea-add-btn" onclick="addIdea()"><i class="ti ti-plus" aria-hidden="true"></i>Add</button>
    </div>
  </div>

  <div id="tab-board" class="section">
    <div class="section-label">storyboard</div>
    <div class="sb-list" id="sb-list"></div>
    <button class="add-btn" onclick="addStoryboard()"><i class="ti ti-plus" aria-hidden="true"></i>New storyboard</button>
  </div>
</div>

<script>
const TASKS = [
  {id:'script',text:'Finalize script',tag:'plan',tagClass:'tag-plan'},
  {id:'audio',text:'Record audio (10 takes)',tag:'record',tagClass:'tag-record'},
  {id:'take',text:'Pick best take',tag:'record',tagClass:'tag-record'},
  {id:'storyboard',text:'Write storyboard',tag:'plan',tagClass:'tag-plan'},
  {id:'edit',text:'Edit video',tag:'edit',tagClass:'tag-edit'},
  {id:'post',text:'Export + post',tag:'post',tagClass:'tag-post'},
  {id:'comments',text:'Check comments',tag:'post',tagClass:'tag-post'},
];

function load(k,def){try{return JSON.parse(localStorage.getItem(k))??def}catch{return def}}
function save(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch{}}

let state = {
  startDate: load('tb_startDate', new Date().toDateString()),
  postedDays: load('tb_postedDays', {}),
  checks: load('tb_checks', {}),
  scripts: load('tb_scripts', [
    {id:'s1',day:'Day 1',title:'Sabse bada unfair advantage',status:'ready',hook:'Sabse bada unfair advantage jo tumhare paas hai — tumhara ghar aur tumhara phone.',setup:'Mera naam Bibek hai, aur main ek hostel mein rehta hoon jahan mobile aur laptop dono allowed nahi hain.',build:'Normal log 2-3 months mein itni editing seekhte hain — mujhe 7 mahine lage, 2 vacations aur kuch leaves mein.',punchline:'Aadhi vacation learning mein gayi, ab baaki mein kuch build karna hai.',cta:'Yeh tha Day 1 of 30. Follow karo. Main Bibek — signing off.',open:false}
  ]),
  ideas: load('tb_ideas', [
    {id:'i1',text:'Why talented log broke rehte hain',cat:'value'},
    {id:'i2',text:'2am productive, 2pm useless — psychology',cat:'viral'},
    {id:'i3',text:'Jo goal batao woh complete kyun nahi hota',cat:'value'},
    {id:'i4',text:'Hostel mein band rehke skills kaise seekhe',cat:'series'},
    {id:'i5',text:'Indian parents vs ambition',cat:'value'},
  ]),
  storyboards: load('tb_storyboards', [
    {id:'sb1',title:'Day 1 — Unfair Advantage',open:false,rows:[
      {time:'0:00–0:03',voice:'Sabse bada unfair advantage...',screen:'Big bold text: UNFAIR ADVANTAGE appears'},
      {time:'0:03–0:10',voice:'Mera naam Bibek, hostel mein rehta hoon',screen:'Backrooms monkey pfp + text: Bibek'},
      {time:'0:10–0:25',voice:'Mobile aur laptop allowed nahi',screen:'Crossed out phone + laptop icons'},
      {time:'0:25–0:40',voice:'Normal log 2-3 months, mujhe 7 mahine',screen:'Timeline: 2-3 months vs 7 months'},
      {time:'0:40–0:55',voice:'Day 1 of 30. Follow karo. Signing off.',screen:'DAY 1/30 text. Channel name. End card.'},
    ]}
  ])
};

function getDay(){
  const start = new Date(state.startDate);
  const now = new Date();
  const diff = Math.floor((now-start)/(1000*60*60*24));
  return Math.min(Math.max(diff+1,1),30);
}

function countPosted(){return Object.values(state.postedDays).filter(Boolean).length}

function renderHeader(){
  const day = getDay();
  const posted = countPosted();
  const left = Math.max(30-day+1,0);
  document.getElementById('day-subtitle').textContent = `Day ${day} of 30`;
  document.getElementById('posted-badge').textContent = `${posted} posted`;
  document.getElementById('stat-posted').textContent = posted;
  document.getElementById('stat-day').textContent = day;
  document.getElementById('stat-left').textContent = left;
  document.getElementById('progress-fill').style.width = Math.round((day/30)*100)+'%';
}

function renderGrid(){
  const day = getDay();
  const el = document.getElementById('grid30');
  el.innerHTML = '';
  for(let i=1;i<=30;i++){
    const cell = document.createElement('div');
    cell.className = 'day-cell';
    if(state.postedDays[i]) cell.classList.add('posted');
    else if(i===day) cell.classList.add('today');
    cell.textContent = i;
    cell.onclick = ()=>togglePosted(i);
    el.appendChild(cell);
  }
}

function togglePosted(d){
  state.postedDays[d] = !state.postedDays[d];
  save('tb_postedDays', state.postedDays);
  renderGrid();
  renderHeader();
}

function renderChecklist(){
  const day = getDay();
  const key = 'day'+day;
  if(!state.checks[key]) state.checks[key] = {};
  const el = document.getElementById('checklist');
  el.innerHTML = '';
  TASKS.forEach(t=>{
    const done = !!state.checks[key][t.id];
    const item = document.createElement('div');
    item.className = 'check-item'+(done?' done':'');
    item.innerHTML = `<div class="check-box">${done?'<i class="ti ti-check" style="font-size:12px;color:var(--color-text-success)" aria-hidden="true"></i>':''}</div><span class="check-text">${t.text}</span><span class="tag ${t.tagClass}">${t.tag}</span>`;
    item.onclick = ()=>{
      state.checks[key][t.id] = !done;
      save('tb_checks', state.checks);
      renderChecklist();
    };
    el.appendChild(item);
  });
}

function resetToday(){
  const day = getDay();
  state.checks['day'+day] = {};
  save('tb_checks', state.checks);
  renderChecklist();
}

function renderScripts(){
  const el = document.getElementById('script-list');
  el.innerHTML = '';
  state.scripts.forEach((s,idx)=>{
    const card = document.createElement('div');
    card.className = 'script-card';
    const statusClass = s.status==='ready'?'ready':'draft';
    card.innerHTML = `
      <div class="script-header" onclick="toggleScript(${idx})">
        <span class="script-day-badge">${s.day||'New'}</span>
        <span class="script-title">${s.title||'Untitled script'}</span>
        <span class="script-status ${statusClass}">${s.status}</span>
        <i class="ti ti-chevron-down" style="font-size:16px;color:var(--color-text-tertiary)" aria-hidden="true"></i>
      </div>
      <div class="script-body${s.open?' open':''}" id="sbody-${idx}">
        <div class="script-field"><label>Title</label><textarea rows="1" oninput="updateScript(${idx},'title',this.value)">${s.title||''}</textarea></div>
        <div class="script-field"><label>Hook (first 3 sec)</label><textarea oninput="updateScript(${idx},'hook',this.value)">${s.hook||''}</textarea></div>
        <div class="script-field"><label>Setup</label><textarea oninput="updateScript(${idx},'setup',this.value)">${s.setup||''}</textarea></div>
        <div class="script-field"><label>Build (the meat)</label><textarea oninput="updateScript(${idx},'build',this.value)">${s.build||''}</textarea></div>
        <div class="script-field"><label>Punchline</label><textarea oninput="updateScript(${idx},'punchline',this.value)">${s.punchline||''}</textarea></div>
        <div class="script-field"><label>CTA / Sign-off</label><textarea oninput="updateScript(${idx},'cta',this.value)">${s.cta||''}</textarea></div>
        <div style="display:flex;gap:8px;margin-top:12px">
          <select onchange="updateScript(${idx},'status',this.value)" style="padding:7px 10px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-tertiary);background:var(--color-background-secondary);color:var(--color-text-primary);font-size:13px">
            <option value="draft"${s.status==='draft'?' selected':''}>Draft</option>
            <option value="ready"${s.status==='ready'?' selected':''}>Ready</option>
          </select>
          <button onclick="deleteScript(${idx})" style="padding:7px 12px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-tertiary);background:transparent;color:var(--color-text-danger);font-size:13px;cursor:pointer;display:flex;align-items:center;gap:6px"><i class="ti ti-trash" aria-hidden="true"></i>Delete</button>
        </div>
      </div>`;
    el.appendChild(card);
  });
}

function toggleScript(idx){
  state.scripts[idx].open = !state.scripts[idx].open;
  save('tb_scripts', state.scripts);
  renderScripts();
}

function updateScript(idx,field,val){
  state.scripts[idx][field] = val;
  save('tb_scripts', state.scripts);
}

function addScript(){
  const day = getDay();
  state.scripts.unshift({id:'s'+Date.now(),day:'Day '+day,title:'',status:'draft',hook:'',setup:'',build:'',punchline:'',cta:'',open:true});
  save('tb_scripts', state.scripts);
  renderScripts();
  switchTab('scripts');
}

function deleteScript(idx){
  state.scripts.splice(idx,1);
  save('tb_scripts', state.scripts);
  renderScripts();
}

function renderIdeas(){
  const el = document.getElementById('idea-list');
  el.innerHTML = '';
  const labels = {value:'Value',viral:'Viral',series:'Series',auth:'Authentic'};
  state.ideas.forEach((idea,idx)=>{
    const item = document.createElement('div');
    item.className = 'idea-item';
    item.innerHTML = `<span class="idea-text">${idea.text}</span><span class="idea-cat ${idea.cat}">${labels[idea.cat]||idea.cat}</span><button class="idea-del" onclick="deleteIdea(${idx})" aria-label="Delete idea"><i class="ti ti-x" aria-hidden="true"></i></button>`;
    el.appendChild(item);
  });
}

function addIdea(){
  const input = document.getElementById('idea-input');
  const cat = document.getElementById('idea-cat').value;
  const text = input.value.trim();
  if(!text) return;
  state.ideas.unshift({id:'i'+Date.now(),text,cat});
  save('tb_ideas', state.ideas);
  input.value = '';
  renderIdeas();
}

function deleteIdea(idx){
  state.ideas.splice(idx,1);
  save('tb_ideas', state.ideas);
  renderIdeas();
}

function renderStoryboards(){
  const el = document.getElementById('sb-list');
  el.innerHTML = '';
  state.storyboards.forEach((sb,idx)=>{
    const card = document.createElement('div');
    card.className = 'sb-card';
    let rowsHtml = `<div class="sb-row"><span>Time</span><span>Voice</span><span>On screen</span></div>`;
    sb.rows.forEach((row,ri)=>{
      rowsHtml += `<div class="sb-row"><input value="${row.time||''}" placeholder="0:00–0:05" oninput="updateSbRow(${idx},${ri},'time',this.value)"><input value="${row.voice||''}" placeholder="What you say..." oninput="updateSbRow(${idx},${ri},'voice',this.value)"><input value="${row.screen||''}" placeholder="What's on screen..." oninput="updateSbRow(${idx},${ri},'screen',this.value)"></div>`;
    });
    card.innerHTML = `
      <div class="sb-header" onclick="toggleSb(${idx})">
        <span class="sb-title">${sb.title||'Untitled storyboard'}</span>
        <i class="ti ti-chevron-down" style="font-size:16px;color:var(--color-text-tertiary)" aria-hidden="true"></i>
      </div>
      <div class="sb-body${sb.open?' open':''}">${rowsHtml}
        <div class="sb-add-row"><button onclick="addSbRow(${idx})"><i class="ti ti-plus" aria-hidden="true"></i> Add row</button></div>
        <div style="margin-top:8px;display:flex;gap:8px">
          <input value="${sb.title||''}" placeholder="Storyboard title" style="flex:1;padding:7px 10px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-tertiary);background:var(--color-background-secondary);color:var(--color-text-primary);font-size:13px" oninput="updateSb(${idx},'title',this.value)">
          <button onclick="deleteSb(${idx})" style="padding:7px 12px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-tertiary);background:transparent;color:var(--color-text-danger);font-size:13px;cursor:pointer;display:flex;align-items:center;gap:6px"><i class="ti ti-trash" aria-hidden="true"></i>Delete</button>
        </div>
      </div>`;
    el.appendChild(card);
  });
}

function toggleSb(idx){state.storyboards[idx].open=!state.storyboards[idx].open;save('tb_storyboards',state.storyboards);renderStoryboards()}
function updateSb(idx,field,val){state.storyboards[idx][field]=val;save('tb_storyboards',state.storyboards)}
function updateSbRow(idx,ri,field,val){state.storyboards[idx].rows[ri][field]=val;save('tb_storyboards',state.storyboards)}
function addSbRow(idx){state.storyboards[idx].rows.push({time:'',voice:'',screen:''});save('tb_storyboards',state.storyboards);renderStoryboards()}
function deleteSb(idx){state.storyboards.splice(idx,1);save('tb_storyboards',state.storyboards);renderStoryboards()}
function addStoryboard(){
  const day=getDay();
  state.storyboards.unshift({id:'sb'+Date.now(),title:'Day '+day+' — ',open:true,rows:[{time:'0:00–0:03',voice:'',screen:''},{time:'0:03–0:10',voice:'',screen:''},{time:'0:10–0:25',voice:'',screen:''},{time:'0:25–0:40',voice:'',screen:''},{time:'0:40–0:55',voice:'',screen:''}]});
  save('tb_storyboards',state.storyboards);
  renderStoryboards();
  switchTab('board');
}

function switchTab(name){
  document.querySelectorAll('.tab').forEach((t,i)=>{
    const names=['today','scripts','ideas','board'];
    t.classList.toggle('active',names[i]===name);
  });
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
}

save('tb_startDate', state.startDate);
renderHeader();
renderGrid();
renderChecklist();
renderScripts();
renderIdeas();
renderStoryboards();
</script>
